version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gusto_admin
      POSTGRES_PASSWORD: gusto_password
      POSTGRES_DB: gusto_pos_v2
    ports:
      - "5455:5432"
    volumes:
      - postgres_data_final:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  web:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app:cached
    environment:
      - DATABASE_URL=postgresql+asyncpg://gusto_admin:gusto_password@db:5432/gusto_pos_v2

volumes:
  postgres_data_final: